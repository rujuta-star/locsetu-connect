kind = "web"
previewPath = "/"
title = "LocSetu Connect"
version = "1.0.0"
id = "artifacts/locsetu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18186

[services.development]
run = "pnpm --filter @workspace/locsetu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/locsetu", "run", "build" ]
publicDir = "artifacts/locsetu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18186"
BASE_PATH = "/"
